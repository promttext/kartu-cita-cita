<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absen Otomatis - SDN Serut 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; margin: 0; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .box { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; min-width: 320px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 12px; overflow: hidden; background: #222; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .log-table th, .log-table td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .log-table th { background: #1565c0; color: white; }
        #notif { font-size: 24px; font-weight: bold; margin: 15px 0; min-height: 35px; color: #2e7d32; }
        .status-success { animation: pop 0.5s ease-in-out; }
        .file-input-wrapper { margin-top: 15px; padding: 10px; border: 2px dashed #1565c0; border-radius: 8px; background: #f0f7ff; }
        @keyframes pop { 0% { transform: scale(0.8); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <h1>🚨 PANEL ABSENSI OTOMATIS SDN SERUT 01 🚨</h1>
    <p>Arahkan QR Twibbon ke Kamera Belakang HP, atau upload file fotonya langsung di bawah.</p>

    <div class="container">
        <div class="box">
            <h3>📷 SCANNER UTAMA</h3>
            <div id="reader"></div>
            
            <div class="file-input-wrapper">
                <p style="margin: 0 0 8px 0; font-size: 14px; font-weight: bold; color: #1565c0;">Uji Coba 1 HP? Scan Lewat File Gambar:</p>
                <input type="file" id="qr-input-file" accept="image/*" style="width:100%;">
            </div>
            
            <div id="notif">Menunggu QR Code Siswa...</div>
        </div>

        <div class="box">
            <h3>📅 DAFTAR HADIR HARI INI (<span id="count">0</span> Siswa)</h3>
            <button onclick="clearAbsen()" style="padding: 8px 12px; background: #d32f2f; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px;">Reset Data Absen</button>
            <div style="max-height: 350px; overflow-y: auto;">
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Nama Siswa</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="logMulai"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
const audioBip = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
let dataAbsen = JSON.parse(localStorage.getItem('absen_sdn_serut')) || [];

function updateTable() {
    const tbody = document.getElementById("logMulai");
    const countSpan = document.getElementById("count");
    tbody.innerHTML = "";
    
    dataAbsen.slice().reverse().forEach(item => {
        let row = `<tr>
            <td><b>${item.jam}</b></td>
            <td>${item.nama}</td>
            <td style="color: green; font-weight:bold;">✅ HADIR</td>
        </tr>`;
        tbody.innerHTML += row;
    });
    countSpan.innerText = dataAbsen.length;
}

function prosesAbsensi(decodedText) {
    try {
        if (!decodedText.includes("nama=")) return;

        const url = new URL(decodedText);
        const namaSiswa = url.searchParams.get("nama");
        
        if (!namaSiswa) return;
        
        const sekarang = new Date();
        const jamStr = sekarang.getHours().toString().padStart(2, '0') + ':' + sekarang.getMinutes().toString().padStart(2, '0') + ':' + sekarang.getSeconds().toString().padStart(2, '0');
        const menitSekarang = sekarang.getMinutes();

        // Anti double-scan siswa yang sama di menit yang sama
        const sudahAbsen = dataAbsen.some(item => item.nama === namaSiswa && item.menit === menitSekarang);
        if (sudahAbsen) return;

        audioBip.play().catch(e => console.log("Izin audio aktif"));
        const notif = document.getElementById("notif");
        notif.innerText = `👋 SELAMAT DATANG, ${namaSiswa}!`;
        notif.className = "status-success";
        
        dataAbsen.push({ nama: namaSiswa, jam: jamStr, menit: menitSekarang });
        localStorage.setItem('absen_sdn_serut', JSON.stringify(dataAbsen));
        
        updateTable();
        setTimeout(() => { notif.className = ""; }, 2500);

    } catch (e) {
        console.error("Format QR Code tidak dikenal:", e);
    }
}

// 1. INISIALISASI SCANNER KAMERA (Dipaksa pakai Kamera Belakang Anti-Mirror)
const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
    fps: 15, 
    qrbox: {width: 260, height: 260},
    rememberLastUsedCamera: true,
    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
});

// Menjalankan scanner kamera dengan konfigurasi kamera belakang resmi
html5QrcodeScanner.render(prosesAbsensi);

// 2. INISIALISASI SCANNER LEWAT FILE GALERI HP (Solusi jika kamera bermasalah)
const html5QrCode = new Html5Qrcode("reader");
const fileInput = document.getElementById('qr-input-file');

fileInput.addEventListener('change', e => {
    if (e.target.files.length == 0) return;
    
    const imageFile = e.target.files[0];
    // Scan langsung file gambar twibbon yang diupload
    html5QrCode.scanFile(imageFile, true)
        .then(decodedText => {
            prosesAbsensi(decodedText);
            fileInput.value = ""; // Reset input file setelah berhasil
        })
        .catch(err => {
            alert("QR Code tidak ditemukan pada gambar ini. Pastikan gambar twibbon jelas.");
            fileInput.value = "";
        });
});

function clearAbsen() {
    if (confirm("Hapus semua data absen hari ini?")) {
        dataAbsen = [];
        localStorage.removeItem('absen_sdn_serut');
        updateTable();
    }
}

updateTable();
</script>
</body>
</html>
