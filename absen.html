<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absen Otomatis - SDN Serut 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; margin: 0; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .box { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; min-width: 320px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 12px; overflow: hidden; background: #222; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .log-table th, .log-table td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .log-table th { background: #1565c0; color: white; }
        #notif { font-size: 22px; font-weight: bold; margin: 15px 0; min-height: 35px; color: #2e7d32; }
        #notif.error { color: #c62828; }
        .pc-only { display: none; }
        @media (min-width: 768px) { .pc-only { display: block; } }
    </style>
</head>
<body>

    <h1>🚨 PANEL ABSENSI ONLINE SDN SERUT 01 🚨</h1>

    <div class="pc-only" id="pcNotice" style="display:none;">
        <p style="background:#fff3cd;color:#856404;padding:10px;border-radius:8px;font-weight:bold;max-width:700px;margin:0 auto 15px auto;">
            🖥️ Mode Monitor PC Aktif (Tanpa Kamera). Scan QR pakai HP, tabel akan terisi otomatis.
        </p>
    </div>

    <div class="container">
        <div class="box" id="scannerBox">
            <h3>📷 SCANNER KAMERA (HP)</h3>
            <div id="reader"></div>
            <div id="notif">Menunggu QR Code Siswa...</div>
        </div>

        <div class="box">
            <h3>📅 DAFTAR HADIR REAL-TIME (<span id="count">0</span> Siswa)</h3>
            <div style="max-height: 450px; overflow-y: auto;">
                <table class="log-table">
                    <thead>
                        <tr><th>Waktu</th><th>Nama Siswa</th><th>Status</th></tr>
                    </thead>
                    <tbody id="logMulai"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
// ⚠️ GANTI dengan URL Web App deployment TERBARU Anda.
// URL ini HARUS SAMA PERSIS dengan yang ada di tampil.html
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlHfUpwFJdrA5miV4pI4L48Zu_XjKJrhg3SFRKx_PbWLDMNwHwqHwLjIADUIUvJwrBXw/exec";

const audioBip = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
let sedangProses = false;
let lastScan = { text: "", time: 0 };

function setNotif(pesan, isError = false) {
    const el = document.getElementById("notif");
    el.innerText = pesan;
    el.className = isError ? "error" : "";
}

function formatJam(iso) {
    if (!iso) return "-";
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function muatDataDariCloud() {
    fetch(`${SCRIPT_URL}?action=list&limit=50&t=${Date.now()}`, { method: 'GET', redirect: 'follow' })
    .then(res => res.json())
    .then(resp => {
        const data = Array.isArray(resp.data) ? resp.data : [];
        const tbody = document.getElementById("logMulai");
        document.getElementById("count").innerText = data.length;
        tbody.innerHTML = "";
        data.forEach(item => {
            tbody.innerHTML += `<tr>
                <td><b>${formatJam(item.waktu)}</b></td>
                <td>${item.nama || ''}</td>
                <td style="color:green;font-weight:bold;">✅ HADIR</td>
            </tr>`;
        });
    })
    .catch(err => console.log("Menghubungkan ke server...", err));
}

function prosesAbsensi(decodedText) {
    if (sedangProses) return;

    // Cegah scan ganda QR yang sama dalam 5 detik
    const now = Date.now();
    if (decodedText === lastScan.text && (now - lastScan.time) < 5000) return;
    lastScan = { text: decodedText, time: now };

    let namaSiswa = "";
    try {
        if (decodedText.includes("nama=")) {
            // Support QR berupa URL dengan ?nama=xxx
            try {
                const url = new URL(decodedText);
                namaSiswa = url.searchParams.get("nama") || "";
            } catch (_) {
                const m = decodedText.match(/nama=([^&]+)/);
                namaSiswa = m ? decodeURIComponent(m[1]) : "";
            }
        } else {
            namaSiswa = decodedText.trim();
        }
        if (!namaSiswa) return;

        sedangProses = true;
        setNotif(`⏳ Mencatat: ${namaSiswa}...`);
        audioBip.play().catch(() => {});

        fetch(`${SCRIPT_URL}?action=write&nama=${encodeURIComponent(namaSiswa)}&t=${Date.now()}`, {
            method: 'GET',
            redirect: 'follow'
        })
        .then(res => {
            if (!res.ok) throw new Error("HTTP " + res.status);
            return res.json();
        })
        .then(response => {
            if (response.status === "sukses") {
                const nama = (response.data && response.data.nama) || namaSiswa;
                setNotif(`👋 SELAMAT DATANG, ${nama}!`);
                muatDataDariCloud();
            } else {
                setNotif(`⚠ Gagal: ${response.message || "server menolak"}`, true);
            }
        })
        .catch(err => {
            console.error("Gagal kirim data:", err);
            setNotif(`❌ Gagal kirim. Cek koneksi / URL Script / akses "Anyone".`, true);
        })
        .finally(() => {
            setTimeout(() => {
                setNotif("Menunggu QR Code Siswa...");
                sedangProses = false;
            }, 2500);
        });

    } catch (e) {
        console.error(e);
        sedangProses = false;
        setNotif("❌ QR tidak valid", true);
    }
}

// Deteksi kamera
navigator.mediaDevices.enumerateDevices().then(devices => {
    const punyaKamera = devices.some(d => d.kind === 'videoinput');
    if (!punyaKamera || window.innerWidth >= 768) {
        // Laptop / tanpa kamera → mode monitor
        document.getElementById("scannerBox").style.display = "none";
        document.getElementById("pcNotice").style.display = "block";
    } else {
        inisialisasiScanner();
    }
}).catch(() => {
    document.getElementById("scannerBox").style.display = "none";
    document.getElementById("pcNotice").style.display = "block";
});

function inisialisasiScanner() {
    const scanner = new Html5QrcodeScanner("reader", {
        fps: 10,
        qrbox: { width: 250, height: 250 },
        rememberLastUsedCamera: true,
        showTorchButtonIfSupported: true
    }, false);
    scanner.render(prosesAbsensi, () => {});
}

setInterval(muatDataDariCloud, 4000);
muatDataDariCloud();
</script>
</body>
</html>
