<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri Serut 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; max-width: 900px; margin: auto; padding: 20px; text-align: center; }
        .panel { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
        .logo-web { max-width: 120px; width: 100%; height: auto; margin: 10px auto 15px; display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 10px; background: #1565c0; color: white; cursor: pointer; font-weight: bold; }
        #preview { max-width: 420px; width: 100%; margin-top: 15px; border-radius: 12px; cursor: move; background: #eee; display: inline-block; }
        canvas { display: none; }
        #qrSource { visibility: hidden; position: fixed; top: 0; left: 0; }
    </style>
</head>
<body>

<div class="panel">
    <img src="logo.png" alt="Logo Sekolah" class="logo-web">
    <h2>SD Negeri Serut 01</h2>
    <input type="file" id="foto" accept="image/*">
    <input type="text" id="nama" placeholder="Masukkan Nama Siswa">
    <p><b>Geser foto dengan mouse/jari. Zoom dengan roda mouse atau cubit layar HP.</b></p>
    <button id="renderBtn">Preview & Update QR</button>
    <a id="download" style="display:none;"><button type="button">Download PNG</button></a>
    <br><br>
    <img id="preview" alt="Preview">
</div>

<div id="qrSource"></div>
<canvas id="canvas" width="1529" height="2048"></canvas>

<script>
const TEMPLATE_SRC = "template.png";
let userImage = null, posX = 0, posY = 0, scale = 1.0, dragging = false, startX = 0, startY = 0;
const preview = document.getElementById("preview"), canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// Fungsi pembantu rasio canvas (diperlukan untuk akurasi drag)
function getCanvasRatio() {
    return preview.clientWidth ? canvas.width / preview.clientWidth : 1;
}

// FUNGSI AUTOFONT (Menghindari error crash)
function autoFont(ctx, text, maxWidth, startSize) {
    let size = startSize;
    while (size > 20) {
        ctx.font = `bold ${size}px Arial`;
        if (ctx.measureText(text).width <= maxWidth) {
            return size;
        }
        size--;
    }
    return 20;
}

function render() {
    if (!userImage) return;

    const templateImage = new Image();
    templateImage.crossOrigin = "anonymous";

    templateImage.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Gambar Foto
        const cx = 775, cy = 1055, minTargetSize = 900;
        const base = Math.max(minTargetSize / userImage.width, minTargetSize / userImage.height) * scale;
        ctx.drawImage(userImage, cx - (userImage.width * base)/2 + posX, cy - (userImage.height * base)/2 + posY, userImage.width * base, userImage.height * base);

        // 2. Gambar Template
        ctx.drawImage(templateImage, 0, 0, canvas.width, canvas.height);

        // 3. Nama Siswa (Rata Kiri, Putih, Stroke Hitam)
        const nama = (document.getElementById("nama").value || "").toUpperCase();
        ctx.fillStyle = "#FFFFFF";       // Warna teks putih
        ctx.strokeStyle = "#000000";     // Warna garis pinggir hitam
        ctx.lineWidth = 10;              // Ketebalan stroke
        ctx.textAlign = "left";          // Rata Kiri

        // Hitung ukuran font otomatis agar tidak kepanjangan
        const fontSize = autoFont(ctx, nama, 1000, 75); 
        ctx.font = `bold ${fontSize}px Arial`;

        // Gambar tulisan di koordinat X=120 (Kiri) dan Y=1930
        ctx.strokeText(nama, 120, 1930); 
        ctx.fillText(nama, 120, 1930); 

        // 4. Jalankan QR Code
        const qrContainer = document.getElementById("qrSource");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: nama || "SISWA", width: 300, height: 300 });

        // Beri jeda agar QR selesai digenerate sebelum ditempel ke canvas
        setTimeout(() => {
            const qrImg = qrContainer.querySelector("img");
            if (qrImg) {
                ctx.drawImage(qrImg, 1110, 1790, 390, 390);
            }
            
            // Ekspor final ke tag preview <img>
            try {
                const data = canvas.toDataURL("image/png");
                preview.src = data;

                const dl = document.getElementById("download");
                if (dl) {
                    dl.href = data;
                    dl.download = "Kartu-Cita-Cita.png";
                    dl.style.display = "inline-block";
                }
            } catch (err) {
                console.error("Gagal ekspor gambar:", err);
            }
        }, 300);
    };

    templateImage.onerror = () => {
        alert("Gagal memuat file template.png!");
    };

    templateImage.src = TEMPLATE_SRC;
}

/* ==========================
   INTERAKSI MOUSE (PC/Laptop)
========================== */
preview.addEventListener("mousedown", e => {
    dragging = true;
    startX = e.clientX - posX;
    startY = e.clientY - posY;
});

window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", e => {
    if (!dragging || !userImage) return;
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    render();
});

preview.addEventListener("wheel", e => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    scale = Math.max(0.3, Math.min(scale, 5));
    render();
});

/* ==========================
   INTERAKSI SENTUH (HP)
========================== */
let pinchStart = 0;
preview.addEventListener("touchstart", e => {
    if (e.touches.length === 1) {
        dragging = true;
        startX = e.touches[0].clientX - posX;
        startY = e.touches[0].clientY - posY;
    }
    if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        pinchStart = Math.hypot(dx, dy);
    }
});

preview.addEventListener("touchmove", e => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging) {
        posX = e.touches[0].clientX - startX;
        posY = e.touches[0].clientY - startY;
        render();
    }
    if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const distance = Math.hypot(dx, dy);
        scale *= distance / pinchStart;
        scale = Math.max(0.3, Math.min(scale, 5));
        pinchStart = distance;
        render();
    }
}, { passive: false });

preview.addEventListener("touchend", () => { dragging = false; });

/* ==========================
   INPUT HANDLING
========================== */
document.getElementById("foto").addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f) return;
    const img = new Image();
    img.onload = () => { userImage = img; posX=0; posY=0; scale=1.0; render(); };
    img.src = URL.createObjectURL(f);
});

document.getElementById("nama").addEventListener("input", render);
document.getElementById("renderBtn").addEventListener("click", render);
</script>
</body>
</html>
