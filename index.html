<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri Serut 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; max-width: 900px; margin: auto; padding: 20px; text-align: center; }
        .panel { background: #fff; padding: 20px; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
        .logo-web { max-width: 120px; width: 100%; height: auto; margin: 10px auto 15px; display: block; }
        input { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; }
        button { padding: 12px 20px; border: none; border-radius: 10px; background: #1565c0; color: white; cursor: pointer; font-weight: bold; }
        #preview { max-width: 420px; width: 100%; margin-top: 15px; border-radius: 12px; cursor: move; background: #eee; min-height: 200px; display: inline-block; }
        canvas { display: none; }
        /* Container QR tersembunyi */
        #qrSource { visibility: hidden; position: fixed; top: 0; left: 0; }
    </style>
</head>
<body>

<div class="panel">
    <img src="logo.png" alt="Logo Sekolah" class="logo-web">
    <h2>SD Negeri Serut 01</h2>
    <input type="file" id="foto" accept="image/*">
    <input type="text" id="nama" placeholder="Masukkan Nama Siswa">
    <p><b>Geser/Zoom foto, lalu klik Preview.</b></p>
    <button id="renderBtn">Preview & Generate QR</button>
    <a id="download" style="display:none;"><button type="button">Download PNG</button></a>
    <br><br>
    <img id="preview" alt="Preview Twibbon akan muncul di sini">
</div>

<div id="qrSource"></div>
<canvas id="canvas" width="1529" height="2048"></canvas>

<script>
const TEMPLATE_SRC = "template.png";
let userImage = null, posX = 0, posY = 0, scale = 1.0, dragging = false, startX = 0, startY = 0;
const preview = document.getElementById("preview"), canvas = document.getElementById("canvas");

function getCanvasRatio() { return preview.clientWidth ? canvas.width / preview.clientWidth : 1; }

function autoFont(ctx, text, maxWidth, startSize) {
    let size = startSize;
    while (size > 20) {
        ctx.font = `bold ${size}px Arial`;
        if (ctx.measureText(text).width <= maxWidth) return size;
        size--;
    }
    return 20;
}

function render() {
    if (!userImage) return;
    const ctx = canvas.getContext("2d");
    const templateImage = new Image();
    templateImage.crossOrigin = "anonymous";
    templateImage.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // Gambar Foto
        const cx = 775, cy = 1055, minTargetSize = 900;
        const baseScale = Math.max(minTargetSize / userImage.width, minTargetSize / userImage.height) * scale;
        ctx.drawImage(userImage, cx - (userImage.width * baseScale)/2 + posX, cy - (userImage.height * baseScale)/2 + posY, userImage.width * baseScale, userImage.height * baseScale);
        
        // Template
        ctx.drawImage(templateImage, 0, 0, canvas.width, canvas.height);

        // Nama
        const nama = (document.getElementById("nama").value || "").toUpperCase();
        ctx.fillStyle = "#111"; ctx.textAlign = "center";
        ctx.font = `bold ${autoFont(ctx, nama, 1250, 90)}px Arial`;
        ctx.fillText(nama, 764, 1915);

        // QR Code
        const qrContainer = document.getElementById("qrSource");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: nama || "SISWA", width: 300, height: 300 });
        
        setTimeout(() => {
            const qrImg = qrContainer.querySelector("img");
            if (qrImg) ctx.drawImage(qrImg, 1110, 1690, 320, 320); // Sesuaikan koordinat X, Y di sini
            
            const data = canvas.toDataURL("image/png");
            preview.src = data;
            const dl = document.getElementById("download");
            dl.href = data; dl.download = "Kartu-Cita-Cita.png"; dl.style.display = "inline-block";
        }, 300);
    };
    templateImage.src = TEMPLATE_SRC;
}

// Event Listeners (Drag, Zoom, Touch, dll) tetap sama seperti kode asli Anda...
// (Pastikan sisa fungsi dari kode asli Anda tetap diletakkan di bawah sini)
document.getElementById("foto").addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f) return;
    const img = new Image();
    img.onload = () => { userImage = img; posX = 0; posY = 0; scale = 1; render(); };
    img.src = URL.createObjectURL(f);
});

document.getElementById("renderBtn").addEventListener("click", render);
// Tambahkan kembali fungsi mousedown, mousemove, mouseup, wheel, touchstart, touchmove Anda di sini
</script>
</body>
</html>
