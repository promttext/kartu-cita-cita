<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Negeri Serut 01</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
    body{font-family:Arial,sans-serif;background:#f4f4f4;max-width:900px;margin:auto;padding:20px;text-align:center}
    .panel{background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
    input{width:100%;padding:12px;margin:8px 0;box-sizing:border-box}
    button{padding:12px 20px;border:none;border-radius:10px;background:#1565c0;color:#fff;cursor:pointer;font-weight:bold}
    #preview{max-width:420px;width:100%;margin-top:15px;border-radius:12px;background:#eee;cursor:grab}
    canvas{display:none}
    #qrSource { visibility: hidden; position: fixed; top: 0; left: 0; }
</style>
</head>
<body>
<div class="panel">
    <h2>SD Negeri Serut 01</h2>
    <input type="file" id="foto" accept="image/*">
    <input type="text" id="nama" placeholder="Masukkan Nama Siswa">
    <p><b>Klik & Geser foto untuk posisi, Scroll untuk Zoom.</b></p>
    <button id="renderBtn">Update & Preview</button>
    <a id="download" style="display:none"><button type="button">Download PNG</button></a>
    <br><br>
    <img id="preview" alt="Preview">
</div>

<div id="qrSource"></div>
<canvas id="canvas" width="1529" height="2048"></canvas>

<script>
const TEMPLATE_SRC = "template.png";
let userImage = null, posX = 0, posY = 0, scale = 1.0;
let dragging = false, lastX = 0, lastY = 0;

const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function render() {
    if (!userImage) return;
    const templateImage = new Image();
    templateImage.crossOrigin = "anonymous";
    templateImage.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Gambar Foto dengan Posisi & Skala
        const cx = 775, cy = 1055;
        const w = userImage.width * scale, h = userImage.height * scale;
        ctx.drawImage(userImage, cx - w/2 + posX, cy - h/2 + posY, w, h);

        // Gambar Template
        ctx.drawImage(templateImage, 0, 0, canvas.width, canvas.height);

        // Cetak Nama
        const nama = document.getElementById("nama").value.toUpperCase();
        ctx.fillStyle = "#FFFFFF"; ctx.strokeStyle = "#000000"; ctx.lineWidth = 8;
        ctx.font = "bold 60px Arial";
        ctx.strokeText(nama, 100, 1950);
        ctx.fillText(nama, 100, 1950);

        // Generate QR
        const qrContainer = document.getElementById("qrSource");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: nama || "SISWA", width: 300, height: 300 });
        
        setTimeout(() => {
            const qrImg = qrContainer.querySelector("img");
            if (qrImg) ctx.drawImage(qrImg, 1110, 1690, 320, 320);
            preview.src = canvas.toDataURL("image/png");
            document.getElementById("download").href = canvas.toDataURL("image/png");
            document.getElementById("download").style.display = "inline-block";
        }, 300);
    };
    templateImage.src = TEMPLATE_SRC;
}

// Logika Drag
preview.addEventListener('mousedown', (e) => { dragging = true; lastX = e.clientX; lastY = e.clientY; });
window.addEventListener('mouseup', () => { dragging = false; });
preview.addEventListener('mousemove', (e) => {
    if (dragging) {
        posX += (e.clientX - lastX); posY += (e.clientY - lastY);
        lastX = e.clientX; lastY = e.clientY; render();
    }
});

// Logika Zoom
preview.addEventListener('wheel', (e) => {
    e.preventDefault();
    scale += e.deltaY * -0.001;
    render();
});

document.getElementById("foto").addEventListener("change", e => {
    const reader = new FileReader();
    reader.onload = (event) => {
        userImage = new Image();
        userImage.onload = render;
        userImage.src = event.target.result;
    };
    reader.readAsDataURL(e.target.files[0]);
});

document.getElementById("renderBtn").addEventListener("click", render);
</script>
</body>
</html>
