<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kartu Cita-Citaku SD Serut 01</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f8ff;
max-width:700px;
margin:auto;
padding:20px;
text-align:center;
}

h1{
color:#001B5E;
margin-bottom:10px;
}

.card{
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input[type="text"]{
width:100%;
padding:12px;
margin:10px 0;
font-size:18px;
border-radius:10px;
border:2px solid #ddd;
box-sizing:border-box;
}

input[type="range"]{
width:100%;
}

input[type="file"]{
margin:10px 0;
}

label{
display:block;
text-align:left;
font-weight:bold;
margin-top:12px;
}

button{
background:#1E88E5;
color:white;
border:none;
padding:12px 25px;
font-size:18px;
border-radius:10px;
cursor:pointer;
margin-top:15px;
}

button:hover{
opacity:.9;
}

#preview{
width:100%;
max-width:450px;
margin-top:20px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
display:none;
}

canvas{
display:none;
}

</style>
</head>

<body>

<div class="card">

<h1>🌈 Kartu Cita-Citaku</h1>

<p>
PPDB SD Serut 01
</p>

<input
type="file"
id="foto"
accept="image/*">

<input
type="text"
id="nama"
placeholder="Nama Anak">

<input
type="text"
id="cita"
placeholder="Cita-cita">

<label>🔍 Zoom Foto</label>
<input
type="range"
id="zoom"
min="1"
max="4"
step="0.1"
value="1.5">

<label>↔ Geser Kiri / Kanan</label>
<input
type="range"
id="offsetX"
min="-400"
max="400"
value="0">

<label>↕ Geser Atas / Bawah</label>
<input
type="range"
id="offsetY"
min="-400"
max="400"
value="0">

<button onclick="buatKartu()">
Preview Kartu
</button>

<br>

<a id="download" style="display:none;">
<button>
Download Kartu
</button>
</a>

<br>

<img id="preview">

</div>

<canvas
id="canvas"
width="1529"
height="2048">
</canvas>

<script>

function autoFont(ctx,text,maxWidth,startSize){

let size=startSize;

while(size>20){

ctx.font=`bold ${size}px Arial`;

if(ctx.measureText(text).width<=maxWidth){
return size;
}

size--;
}

return 20;
}

function buatKartu(){

const file=
document.getElementById('foto').files[0];

if(!file)return;

const nama=
document.getElementById('nama').value.trim();

const cita=
document.getElementById('cita').value.trim();

const zoom=
parseFloat(
document.getElementById('zoom').value
);

const offsetX=
parseInt(
document.getElementById('offsetX').value
);

const offsetY=
parseInt(
document.getElementById('offsetY').value
);

const canvas=
document.getElementById('canvas');

const ctx=
canvas.getContext('2d');

const template=
new Image();

template.src="template.png";

template.onload=function(){

ctx.clearRect(
0,
0,
canvas.width,
canvas.height
);

ctx.drawImage(
template,
0,
0,
canvas.width,
canvas.height
);

const foto=
new Image();

foto.src=
URL.createObjectURL(file);

foto.onload=function(){

ctx.save();

ctx.beginPath();

ctx.arc(
852,
1172,
515,
0,
Math.PI * 2
);

ctx.closePath();

ctx.clip();

const baseSize=1030;

const scale=
Math.max(
baseSize/foto.width,
baseSize/foto.height
)*zoom;

const drawWidth=
foto.width*scale;

const drawHeight=
foto.height*scale;

const x =
337 +
offsetX -
(drawWidth - baseSize) / 2;

const y =
657 +
offsetY -
(drawHeight - baseSize) / 2;

ctx.drawImage(
foto,
x,
y,
drawWidth,
drawHeight
);

ctx.restore();

ctx.fillStyle="#001B5E";

ctx.textAlign="left";

let ukuranNama=
autoFont(
ctx,
nama.toUpperCase(),
470,
56
);

ctx.font=
`bold ${ukuranNama}px Arial`;

ctx.fillText(
nama.toUpperCase(),
410,
1295
);

let ukuranCita=
autoFont(
ctx,
cita.toUpperCase(),
470,
56
);

ctx.font=
`bold ${ukuranCita}px Arial`;

ctx.fillText(
cita.toUpperCase(),
410,
1415
);

const hasil=
canvas.toDataURL(
"image/png"
);

document.getElementById(
'preview'
).src=hasil;

document.getElementById(
'preview'
).style.display='block';

const download=
document.getElementById(
'download'
);

download.href=hasil;

download.download=
'Kartu-Cita-Cita.png';

download.style.display=
'inline';

};

};

}

document.getElementById(
'zoom'
).addEventListener(
'input',
buatKartu
);

document.getElementById(
'offsetX'
).addEventListener(
'input',
buatKartu
);

document.getElementById(
'offsetY'
).addEventListener(
'input',
buatKartu
);

document.getElementById(
'foto'
).addEventListener(
'change',
buatKartu
);

document.getElementById(
'nama'
).addEventListener(
'input',
buatKartu
);

document.getElementById(
'cita'
).addEventListener(
'input',
buatKartu
);

</script>

</body>
</html>
