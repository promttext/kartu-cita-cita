<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SD Negeri Serut 01</title>
<!-- Library untuk generate QR Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;max-width:900px;margin:auto;padding:20px;text-align:center}
.panel{background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.logo-web{max-width:120px;width:100%;height:auto;margin:10px auto 15px auto;display:block}
input{width:100%;padding:12px;margin:8px 0;box-sizing:border-box}
button{padding:12px 20px;border:none;border-radius:10px;background:#1565c0;color:#fff;cursor:pointer;font-weight:bold}
#preview{max-width:420px;width:100%;margin-top:15px;border-radius:12px;cursor:move;background:#eee;display:inline-block}
canvas{display:none}
</style>
</head>
<body>
<div class="panel">
    <img src="logo.png" alt="Logo Sekolah" class="logo-web">
    <h2>SD Negeri Serut 01</h2>
    <input type="file" id="foto" accept="image/*">
    <input type="text" id="nama" placeholder="Masukkan Nama Siswa">
    <p><b>Geser/Zoom foto, lalu klik Preview.</b></p>
    <button id="renderBtn">Preview & Update QR</button>
    <a id="download" style="display:none"><button type="button">Download PNG</button></a>
    <br><br>
    <img id="preview" alt="Preview akan muncul di sini">
</div>

<!-- Container tersembunyi untuk QR Code -->
<div id="qrSource" style="display:none"></div>

<canvas id="canvas" width="1529" height="2048"></canvas>

<script>
const TEMPLATE_SRC = "template.png";
let userImage = null;
let posX = 0, posY = 0, scale = 1.0;
let dragging = false, startX = 0, startY = 0;

const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function render() {
    if (!userImage) return;

    const templateImage = new Image();
    templateImage.crossOrigin = "anonymous";
    templateImage.onload = () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. Gambar Foto
        const cx = 775, cy = 1055;
        const minTargetSize = 900;
        const base = Math.max(minTargetSize / userImage.width, minTargetSize / userImage.height) * scale;
        const w = userImage.width * base, h = userImage.height * base;
        ctx.drawImage(userImage, cx - w/2 + posX, cy - h/2 + posY, w, h);

        // 2. Gambar Template
        ctx.drawImage(templateImage, 0, 0, canvas.width, canvas.height);

        // Cetak Nama
            const nama = document.getElementById("nama").value.toUpperCase();
            ctx.fillStyle = "#FFFFFF";
            ctx.strokeStyle = "#000000";
            ctx.lineWidth = 8;
            ctx.textAlign = "left";
            ctx.font = "bold 60px Arial";
            ctx.strokeText(nama, 100, 1950);
            ctx.fillText(nama, 100, 1950);

        // 4. Generate & Gambar QR Code
        const qrContainer = document.getElementById("qrSource");
        qrContainer.innerHTML = "";
        new QRCode(qrContainer, { text: nama || "NAMA_SISWA", width: 256, height: 256 });
        
        setTimeout(() => {
            const qrImg = qrContainer.querySelector("img");
            if (qrImg) {
                // Posisi QR Code di kanvas (atur koordinat x, y, lebar, tinggi di sini)
                ctx.drawImage(qrImg, 1200, 1750, 350, 350); 
            }
            
            // Update Preview
            const data = canvas.toDataURL("image/png");
            preview.src = data;
            const dl = document.getElementById("download");
            dl.href = data;
            dl.download = "Kartu_Siswa.png";
            dl.style.display = "inline-block";
        }, 100);
    };
    templateImage.src = TEMPLATE_SRC;
}

// Event Listeners sama seperti sebelumnya...
document.getElementById("foto").addEventListener("change", e => {
    const f = e.target.files[0];
    const img = new Image();
    img.onload = () => { userImage = img; render(); };
    img.src = URL.createObjectURL(f);
});

document.getElementById("renderBtn").addEventListener("click", render);
// (Logika touch/mouse Anda tetap bisa dipakai di sini)
</script>
</body>
</html>
