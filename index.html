<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Cita-Cita SD Negeri Serut 01</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;max-width:900px;margin:auto;padding:20px;text-align:center}
.panel{background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
input{width:100%;padding:12px;margin:8px 0;box-sizing:border-box}
button{padding:12px 20px;border:none;border-radius:10px;background:#1565c0;color:#fff;cursor:pointer;font-weight:bold}
#preview{max-width:420px;width:100%;margin-top:15px;border-radius:12px;cursor:move;background:#eee;min-height:200px;display:inline-block}
canvas{display:none}
</style>
</head>
<body>
<div class="panel">
<h2>Kartu Cita-Cita SD Negeri Serut 01</h2>

<input type="file" id="foto" accept="image/*">
<input type="text" id="nama" placeholder="Nama Siswa">
<input type="text" id="cita" placeholder="Cita-cita">

<p><b>Geser foto dengan mouse/jari. Zoom dengan roda mouse atau cubit layar HP.</b></p>

<button id="renderBtn">Preview</button>
<a id="download" style="display:none"><button type="button">Download PNG</button></a>
<br><br>
<img id="preview" alt="Preview Twibbon akan muncul di sini">
</div>

<canvas id="canvas" width="1529" height="2048"></canvas>

<script>
const TEMPLATE_SRC = "template.png";

let userImage = null;
let posX = 0, posY = 0, scale = 1.0;
let dragging = false, startX = 0, startY = 0;

const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");

function getCanvasRatio() {
 return preview.clientWidth ? (canvas.width / preview.clientWidth) : 1;
}

function autoFont(ctx, text, maxWidth, start) {
 let s = start;
 while (s > 20) {
  ctx.font = `bold ${s}px Arial`;
  if (ctx.measureText(text).width <= maxWidth) return s;
  s--;
 }
 return 20;
}

function render() {
 if (!userImage) {
  alert("Silakan pilih foto siswa terlebih dahulu!");
  return;
 }

 const ctx = canvas.getContext("2d");
 const templateImage = new Image();
 
 templateImage.crossOrigin = "anonymous";
 
 templateImage.onload = () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // KOORDINAT PUSAT LINGKARAN TRANSPARAN TEMPLATE
  const cx = 775; 
  const cy = 1055;

  const minTargetSize = 900; 
  const base = Math.max(minTargetSize / userImage.width, minTargetSize / userImage.height) * scale;

  const w = userImage.width * base;
  const h = userImage.height * base;

  // 1. Gambar Foto User di Layer Paling Bawah
  ctx.drawImage(userImage, cx - w/2 + posX, cy - h/2 + posY, w, h);

  // 2. Tumpuk dengan Template Transparan di Atasnya
  ctx.drawImage(templateImage, 0, 0, canvas.width, canvas.height);

  // 3. Cetak Teks Nama & Cita-cita (Rata Tengah di Sisi Kosong)
  const nama = (document.getElementById("nama").value || "").toUpperCase();
  const cita = (document.getElementById("cita").value || "").toUpperCase();

  ctx.fillStyle = "#111";
  ctx.textAlign = "center"; 

  // PERBAIKAN KOORDINAT DAN BATAS LEBAR MAKSIMAL (maxWidth)
  // Koordinat X digeser lebih ke kanan (ke area yang benar-benar kosong)
  let fs = autoFont(ctx, nama, 280, 42); 
  ctx.font = `bold ${fs}px Arial`;
  ctx.fillText(nama, 335, 1950); 

  // Koordinat X digeser lebih ke kanan (ke area yang benar-benar kosong)
  fs = autoFont(ctx, cita, 280, 42);
  ctx.font = `bold ${fs}px Arial`;
  ctx.fillText(cita, 983, 1950); 

  // 4. Masukkan ke Elemen Preview Gambar
  try {
   const data = canvas.toDataURL("image/png");
   preview.src = data;

   const dl = document.getElementById("download");
   dl.href = data;
   dl.download = "Kartu-Cita-Cita.png";
   dl.style.display = "inline-block";
  } catch (err) {
   console.error("Gagal ekspor gambar:", err);
  }
 };

 templateImage.onerror = () => {
  alert("Gagal memuat file template.png!");
 };

 templateImage.src = TEMPLATE_SRC;
}

document.getElementById("foto").addEventListener("change", e => {
 const f = e.target.files[0];
 if (!f) return;
 const img = new Image();
 img.onload = () => {
  userImage = img;
  posX = 0; posY = 0; scale = 1.0;
  render(); 
 };
 img.src = URL.createObjectURL(f);
});

document.getElementById("nama").addEventListener("input", render);
document.getElementById("cita").addEventListener("input", render);
document.getElementById("renderBtn").addEventListener("click", render);

// Logika Geser dengan Mouse
preview.addEventListener("mousedown", e => {
 dragging = true; startX = e.clientX; startY = e.clientY;
});
window.addEventListener("mouseup", () => dragging = false);
window.addEventListener("mousemove", e => {
 if (!dragging || !userImage) return;
 const ratio = getCanvasRatio();
 /** @type {number} */
 posX += (e.clientX - startX) * ratio;
 /** @type {number} */
 posY += (e.clientY - startY) * ratio;
 startX = e.clientX; startY = e.clientY;
 render();
});

// Logika Zoom dengan Roda Mouse
preview.addEventListener("wheel", e => {
 e.preventDefault();
 scale += e.deltaY < 0 ? 0.05 : -0.05;
 if (scale < 0.3) scale = 0.3;
 if (scale > 5) scale = 5;
 render();
});

// Logika Touchscreen
let pinchStart = 0;
preview.addEventListener("touchstart", e => {
 if (e.touches.length === 1) {
  dragging = true;
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
 }
 if (e.touches.length === 2) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  pinchStart = Math.hypot(dx, dy);
 }
});

preview.addEventListener("touchmove", e => {
 e.preventDefault();
 if (e.touches.length === 1 && dragging) {
  const ratio = getCanvasRatio();
  posX += (e.touches[0].clientX - startX) * ratio;
  posY += (e.touches[0].clientY - startY) * ratio;
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  render();
 }
 if (e.touches.length === 2) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.hypot(dx, dy);
  scale *= dist / pinchStart;
  if (scale < 0.3) scale = 0.3;
  if (scale > 5) scale = 5;
  pinchStart = dist;
  render();
 }
}, { passive: false });

preview.addEventListener("touchend", () => dragging = false);
</script>
</body>
</html>
