<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Cita-Cita SD Serut 01</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:500px;
margin:auto;
padding:20px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
font-size:16px;
}

button{
padding:12px 20px;
font-size:18px;
cursor:pointer;
}

canvas{
display:none;
}
</style>
</head>

<body>

<h2>Kartu Cita-Citaku</h2>

<input type="file" id="foto" accept="image/*">

<input type="text" id="nama" placeholder="Nama Anak">

<input type="text" id="cita" placeholder="Cita-cita">

<button onclick="buatKartu()">Buat Kartu</button>

<br><br>

<a id="download" style="display:none">
<button>Download Kartu</button>
</a>

<canvas id="canvas" width="1047" height="1536"></canvas>

<script>

function buatKartu(){

const foto=document.getElementById('foto').files[0];
const nama=document.getElementById('nama').value;
const cita=document.getElementById('cita').value;

if(!foto){
alert('Silakan upload foto');
return;
}

const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

const bg=new Image();

bg.src='template.png';

bg.onload=function(){

ctx.drawImage(bg,0,0,canvas.width,canvas.height);

const img=new Image();

img.src=URL.createObjectURL(foto);

img.onload=function(){

ctx.save();

ctx.beginPath();

ctx.arc(524,760,270,0,Math.PI*2);

ctx.closePath();

ctx.clip();

ctx.drawImage(img,220,460,610,610);

ctx.restore();

ctx.font="bold 36px Arial";
ctx.fillStyle="#001B5E";

ctx.fillText(nama,420,1295);

ctx.fillText(cita,420,1415);

const dataURL=canvas.toDataURL("image/png");

const link=document.getElementById('download');

link.href=dataURL;

link.download='Kartu-'+nama+'.png';

link.style.display='inline';

}

}

}
</script>

</body>
</html>
