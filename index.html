<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD Negeri Serut 01</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            max-width: 900px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        .panel {
            background: #fff;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0,0,0,.15);
        }

        /* Logo */
        .logo-web {
            max-width: 120px;
            width: 100%;
            height: auto;
            margin: 10px auto 15px;
            display: block;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            box-sizing: border-box;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 10px;
            background: #1565c0;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        #preview {
            max-width: 420px;
            width: 100%;
            margin-top: 15px;
            border-radius: 12px;
            cursor: move;
            background: #eee;
            min-height: 200px;
            display: inline-block;
        }

        canvas {
            display: none;
        }
    </style>
</head>

<body>

<div class="panel">

    <img src="logo.png" alt="Logo Sekolah" class="logo-web">

    <h2>SD Negeri Serut 01</h2>

    <input type="file" id="foto" accept="image/*">

    <input
        type="text"
        id="nama"
        placeholder="Masukkan Nama Siswa"
    >

    <p>
        <b>
            Geser foto dengan mouse/jari.
            Zoom dengan roda mouse atau cubit layar HP.
        </b>
    </p>

    <button id="renderBtn">
        Preview
    </button>

    <a id="download" style="display:none;">
        <button type="button">
            Download PNG
        </button>
    </a>

    <br><br>

    <img
        id="preview"
        alt="Preview Twibbon akan muncul di sini"
    >

</div>

<canvas
    id="canvas"
    width="1529"
    height="2048">
</canvas>

<script>

const TEMPLATE_SRC = "template.png";

let userImage = null;

let posX = 0;
let posY = 0;
let scale = 1.0;

let dragging = false;
let startX = 0;
let startY = 0;

const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");

function getCanvasRatio() {
    return preview.clientWidth
        ? canvas.width / preview.clientWidth
        : 1;
}

function autoFont(ctx, text, maxWidth, startSize) {

    let size = startSize;

    while (size > 20) {

        ctx.font = `bold ${size}px Arial`;

        if (ctx.measureText(text).width <= maxWidth) {
            return size;
        }

        size--;
    }

    return 20;
}

function render() {

    if (!userImage) {
        alert("Silakan pilih foto siswa terlebih dahulu!");
        return;
    }

    const ctx = canvas.getContext("2d");

    const templateImage = new Image();
    templateImage.crossOrigin = "anonymous";

    templateImage.onload = () => {

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Titik tengah foto
        const centerX = 775;
        const centerY = 1055;

        // Ukuran minimum foto
        const minTargetSize = 900;

        const baseScale =
            Math.max(
                minTargetSize / userImage.width,
                minTargetSize / userImage.height
            ) * scale;

        const drawWidth = userImage.width * baseScale;
        const drawHeight = userImage.height * baseScale;

        // Gambar foto
        ctx.drawImage(
            userImage,
            centerX - drawWidth / 2 + posX,
            centerY - drawHeight / 2 + posY,
            drawWidth,
            drawHeight
        );

        // Template
        ctx.drawImage(
            templateImage,
            0,
            0,
            canvas.width,
            canvas.height
        );

        // Nama siswa
        const nama =
            (document.getElementById("nama").value || "")
            .toUpperCase();

        ctx.fillStyle = "#111";
        ctx.textAlign = "center";

        const fontSize =
            autoFont(
                ctx,
                nama,
                1250,
                90
            );

        ctx.font = `bold ${fontSize}px Arial`;

        ctx.fillText(
            nama,
            764,
            1915
        );

        try {

            const data = canvas.toDataURL("image/png");

            preview.src = data;

            const download =
                document.getElementById("download");

            download.href = data;
            download.download = "Kartu-Cita-Cita.png";
            download.style.display = "inline-block";

        } catch (err) {

            console.error(err);

        }

    };

    templateImage.onerror = () => {
        alert("Gagal memuat file template.png!");
    };

    templateImage.src = TEMPLATE_SRC;

}

/* ==========================
   Upload Foto
========================== */

document
.getElementById("foto")
.addEventListener("change", e => {

    const file = e.target.files[0];

    if (!file) return;

    const img = new Image();

    img.onload = () => {

        userImage = img;

        posX = 0;
        posY = 0;
        scale = 1;

        render();

    };

    img.src = URL.createObjectURL(file);

});

document
.getElementById("nama")
.addEventListener("input", render);

document
.getElementById("renderBtn")
.addEventListener("click", render);

/* ==========================
   Drag Mouse
========================== */

preview.addEventListener("mousedown", e => {

    dragging = true;

    startX = e.clientX;
    startY = e.clientY;

});

window.addEventListener("mouseup", () => {
    dragging = false;
});

window.addEventListener("mousemove", e => {

    if (!dragging || !userImage) return;

    const ratio = getCanvasRatio();

    posX += (e.clientX - startX) * ratio;
    posY += (e.clientY - startY) * ratio;

    startX = e.clientX;
    startY = e.clientY;

    render();

});

/* ==========================
   Zoom Mouse
========================== */

preview.addEventListener("wheel", e => {

    e.preventDefault();

    scale += e.deltaY < 0 ? 0.05 : -0.05;

    if (scale < 0.3) scale = 0.3;
    if (scale > 5) scale = 5;

    render();

});

/* ==========================
   Touchscreen
========================== */

let pinchStart = 0;

preview.addEventListener("touchstart", e => {

    if (e.touches.length === 1) {

        dragging = true;

        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;

    }

    if (e.touches.length === 2) {

        const dx =
            e.touches[0].clientX -
            e.touches[1].clientX;

        const dy =
            e.touches[0].clientY -
            e.touches[1].clientY;

        pinchStart = Math.hypot(dx, dy);

    }

});

preview.addEventListener("touchmove", e => {

    e.preventDefault();

    if (e.touches.length === 1 && dragging) {

        const ratio = getCanvasRatio();

        posX +=
            (e.touches[0].clientX - startX) * ratio;

        posY +=
            (e.touches[0].clientY - startY) * ratio;

        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;

        render();

    }

    if (e.touches.length === 2) {

        const dx =
            e.touches[0].clientX -
            e.touches[1].clientX;

        const dy =
            e.touches[0].clientY -
            e.touches[1].clientY;

        const distance = Math.hypot(dx, dy);

        scale *= distance / pinchStart;

        if (scale < 0.3) scale = 0.3;
        if (scale > 5) scale = 5;

        pinchStart = distance;

        render();

    }

}, { passive: false });

preview.addEventListener("touchend", () => {
    dragging = false;
});

</script>

</body>
</html>
