<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Absen Otomatis - SDN Serut 01</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f3; margin: 0; padding: 20px; text-align: center; color: #333; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .box { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex: 1; min-width: 320px; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 12px; overflow: hidden; background: #222; }
        .log-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .log-table th, .log-table td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; }
        .log-table th { background: #1565c0; color: white; }
        #notif { font-size: 24px; font-weight: bold; margin: 15px 0; min-height: 35px; color: #2e7d32; }
        .pc-only { display: none; }
        @media (min-width: 768px) {
            .pc-only { display: block; }
        }
    </style>
</head>
<body>

    <h1>🚨 PANEL ABSENSI ONLINE SDN SERUT 01 🚨</h1>
    
    <!-- Notifikasi Deteksi Perangkat PC -->
    <div class="pc-only" id="pcNotice" style="display:none;">
        <p style="background: #fff3cd; color: #856404; padding: 10px; border-radius: 8px; font-weight: bold; max-width: 700px; margin: 0 auto 15px auto;">
            🖥️ Mode Monitor PC Aktif (Tanpa Kamera). Gunakan HP Anda untuk scan QR Code, tabel di bawah akan terisi otomatis secara real-time.
        </p>
    </div>

    <div class="container">
        <!-- Kotak Kamera Scanner (Otomatis sembunyi di PC tanpa webcam) -->
        <div class="box" id="scannerBox">
            <h3>📷 SCANNER KAMERA (HP)</h3>
            <div id="reader"></div>
            <div id="notif">Menunggu QR Code Siswa...</div>
        </div>

        <!-- Tabel Daftar Hadir -->
        <div class="box">
            <h3>📅 DAFTAR HADIR REAL-TIME (<span id="count">0</span> Siswa)</h3>
            <div style="max-height: 450px; overflow-y: auto;">
                <table class="log-table">
                    <thead>
                        <tr>
                            <th>Waktu</th>
                            <th>Nama Siswa</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="logMulai"></tbody>
                </table>
            </div>
        </div>
    </div>

<script>
// Menghubungkan langsung dengan Web App Google Sheets Anda
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8fLSro1fU6k0PxN4IAaRNVF7Bsuii1zsL2h_xVz3f7aktLE7k9SV8sWTlMf-kDNf6VA/exec"; 

const audioBip = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-84.wav');
let sedangProses = false;

// 1. Ambil data terbaru dari Google Sheets secara real-time
function muatDataDariCloud() {
    fetch(`${SCRIPT_URL}?action=read`)
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById("logMulai");
            document.getElementById("count").innerText = data.length;
            tbody.innerHTML = "";
            
            // Susun nama dari yang paling baru absen di baris paling atas
            data.reverse().forEach(item => {
                let row = `<tr>
                    <td><b>${item.jam}</b></td>
                    <td>${item.nama}</td>
                    <td style="color: green; font-weight:bold;">✅ HADIR</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        })
        .catch(err => console.log("Menunggu data masuk / Sinkronisasi..."));
}

// 2. Fungsi memproses kiriman QR Code dari HP ke Google Sheets
function prosesAbsensi(decodedText) {
    if (sedangProses) return;
    try {
        if (!decodedText.includes("nama=")) return;

        const url = new URL(decodedText);
        const namaSiswa = url.searchParams.get("nama");
        
        if (!namaSiswa) return;
        
        sedangProses = true;
        document.getElementById("notif").innerText = `Mencatat: ${namaSiswa}...`;
        audioBip.play().catch(e => {});

        // Mengirim data ke Google Sheets via Fetch API
        fetch(`${SCRIPT_URL}?action=write&nama=${encodeURIComponent(namaSiswa)}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById("notif").innerText = `👋 SELAMAT DATANG, ${namaSiswa}!`;
                muatDataDariCloud(); // Paksa re-fetch tabel seketika
                setTimeout(() => {
                    document.getElementById("notif").innerText = "Menunggu QR Code Siswa...";
                    sedangProses = false;
                }, 2500);
            })
            .catch(err => {
                alert("Gagal mengirim data. Pastikan HP terhubung internet.");
                sedangProses = false;
            });

    } catch (e) {
        console.error(e);
    }
}

// 3. Deteksi Otomatis Kamera demi kenyamanan PC tanpa Webcam
navigator.mediaDevices.enumerateDevices().then(devices => {
    const punyaKamera = devices.some(device => device.kind === 'videoinput');
    if (!punyaKamera) {
        // Jika tidak punya kamera (seperti PC Anda), sembunyikan kotak scanner & munculkan info monitor
        document.getElementById("scannerBox").style.display = "none";
        document.getElementById("pcNotice").style.display = "block";
    } else {
        inisialisasiScanner();
    }
}).catch(() => {
    // Jalankan pengaman jika browser menolak mentah-mentah akses media peranti
    if (window.innerWidth >= 768) {
        document.getElementById("scannerBox").style.display = "none";
        document.getElementById("pcNotice").style.display = "block";
    } else {
        inisialisasiScanner();
    }
});

function inisialisasiScanner() {
    // Optimasi resolusi kamera khusus untuk QR Code berkepadatan tinggi
    const html5QrcodeScanner = new Html5QrcodeScanner("reader", { 
        fps: 20, // Menaikkan frame rate agar deteksi lebih responsif
        qrbox: { width: 280, height: 280 }, // Memperbesar kotak bidik
        rememberLastUsedCamera: true,
        videoConstraints: {
            window: { min: 720, ideal: 1080, max: 1440 }, // Memaksa browser menggunakan resolusi HD/Full HD agar kotak QR tidak blur
            facingMode: "environment" // Mengunci otomatis ke kamera belakang utama HP
        }
    });
    html5QrcodeScanner.render(prosesAbsensi);
}

// Cek perubahan data di database setiap 3 detik sekali
setInterval(muatDataDariCloud, 3000);
muatDataDariCloud();
</script>
</body>
</html>
