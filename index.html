<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Cita-Cita SD Negeri Serut 01</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;max-width:900px;margin:auto;padding:20px;text-align:center}
.panel{background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
input{width:100%;padding:12px;margin:8px 0;box-sizing:border-box}
button{padding:12px 20px;border:none;border-radius:10px;background:#1565c0;color:#fff;cursor:pointer}
#preview{max-width:420px;width:100%;margin-top:15px;border-radius:12px;cursor:move;background:#eee;min-height:200px;display:block;margin-left:auto;margin-right:auto}
canvas{display:none}
</style>
</head>
<body>
<div class="panel">
<h2>Kartu Cita-Cita SD Negeri Serut 01</h2>

<input type="file" id="foto" accept="image/*">
<input type="text" id="nama" placeholder="Nama Siswa">
<input type="text" id="cita" placeholder="Cita-cita">

<p><b>Geser foto dengan mouse/jari. Zoom dengan roda mouse atau cubit layar HP.</b></p>

<button id="renderBtn">Preview</button>
<a id="download" style="display:none"><button type="button">Download PNG</button></a>
<br><br>
<img id="preview" alt="Preview Twibbon akan muncul di sini">
</div>

<canvas id="canvas" width="1529" height="2048"></canvas>

<script>
const TEMPLATE_SRC = "template.png";

let userImage = null;
let templateImage = null; 
let posX = 0, posY = 0, scale = 1.0;
let dragging = false, startX = 0, startY = 0;

const preview = document.getElementById("preview");
const canvas = document.getElementById("canvas");

// 1. Pra-muat Template Transparan di Awal
function loadTemplate() {
 return new Promise((resolve, reject) => {
  const img = new Image();
  img.crossOrigin = "anonymous"; 
  img.onload = () => {
   templateImage = img;
   resolve(img);
  };
  img.onerror = () => reject(new Error("Gagal memuat file template.png. Pastikan file ada di folder yang sama."));
  img.src = TEMPLATE_SRC;
 });
}

function getCanvasRatio() {
 return canvas.width / preview.clientWidth;
}

function autoFont(ctx, text, maxWidth, start) {
 let s = start;
 while (s > 20) {
  ctx.font = `bold ${s}px Arial`;
  if (ctx.measureText(text).width <= maxWidth) return s;
  s--;
 }
 return 20;
}

function render() {
 if (!userImage) {
  alert("Silakan pilih foto terlebih dahulu!");
  return;
 }
 if (!templateImage) {
  alert("Template gambar belum selesai dimuat.");
  return;
 }

 const ctx = canvas.getContext("2d");
 ctx.clearRect(0, 0, canvas.width, canvas.height);

 // KOORDINAT PUSAT LINGKARAN TRANSPARAN TEMPLATE
 const cx = 775; 
 const cy = 1055;

 // Menghitung ukuran dasar foto agar menutupi lubang lingkaran (diameter sekitar 860px)
 const minTargetSize = 900; 
 const base = Math.max(minTargetSize / userImage.width, minTargetSize / userImage.height) * scale;

 const w = userImage.width * base;
 const h = userImage.height * base;

 // LANGKAH 1: Gambar foto user di paling bawah (tanpa dipotong bulat)
 ctx.drawImage(
  userImage,
  cx - w / 2 + posX,
  cy - h / 2 + posY,
  w, h
 );

 // LANGKAH 2: Tumpuk dengan template PNG transparan di atasnya
 ctx.drawImage(templateImage, 0, 0, canvas.width, canvas.height);

 // LANGKAH 3: Cetak Teks
 const nama = (document.getElementById("nama").value || "").toUpperCase();
 const cita = (document.getElementById("cita").value || "").toUpperCase();

 ctx.fillStyle = "#111";
 ctx.textAlign = "left";

 // TEKS NAMA
 let fs = autoFont(ctx, nama, 400, 48);
 ctx.font = `bold ${fs}px Arial`;
 ctx.fillText(nama, 290, 1895); 

 // TEKS CITA-CITA
 fs = autoFont(ctx, cita, 400, 48);
 ctx.font = `bold ${fs}px Arial`;
 ctx.fillText(cita, 985, 1895); 

 // LANGKAH 4: Konversi ke Gambar Preview
 try {
  const data = canvas.toDataURL("image/png");
  preview.src = data;

  const dl = document.getElementById("download");
  dl.href = data;
  dl.download = "Kartu-Cita-Cita.png";
  dl.style.display = "inline-block";
 } catch (err) {
  console.error("Gagal melakukan render preview:", err);
  alert("Terjadi kesalahan keamanan browser. Pastikan proyek dijalankan via GitHub Pages / web server, bukan double-click file lokal.");
 }
}

// Load template saat halaman terbuka
loadTemplate().catch(err => {
 console.error(err.message);
});

// Event saat foto dimasukkan
document.getElementById("foto").addEventListener("change", e => {
 const f = e.target.files[0];
 if (!f) return;
 const img = new Image();
 img.onload = () => {
  userImage = img;
  posX = 0; posY = 0; scale = 1.0;
  render(); 
 };
 img.src = URL.createObjectURL(f);
});

document.getElementById("nama").addEventListener("input", render);
document.getElementById("cita").addEventListener("input", render);
document.getElementById("renderBtn").addEventListener("click", render);

// Logika Drag & Drop Foto
preview.addEventListener("mousedown", e => {
 dragging = true; startX = e.clientX; startY = e.clientY;
});
window.addEventListener("mouseup", () => dragging = false);
window.addEventListener("mousemove", e => {
 if (!dragging || !userImage) return;
 const ratio = getCanvasRatio();
 posX += (e.clientX - startX) * ratio;
 posY += (e.clientY - startY) * ratio;
 startX = e.clientX; startY = e.clientY;
 render();
});

// Logika Zoom (Scroll Roda Mouse)
preview.addEventListener("wheel", e => {
 e.preventDefault();
 scale += e.deltaY < 0 ? 0.05 : -0.05;
 if (scale < 0.3) scale = 0.3;
 if (scale > 5) scale = 5;
 render();
});

// Logika Touchscreen (HP)
let pinchStart = 0;
preview.addEventListener("touchstart", e => {
 if (e.touches.length === 1) {
  dragging = true;
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
 }
 if (e.touches.length === 2) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  pinchStart = Math.hypot(dx, dy);
 }
});

preview.addEventListener("touchmove", e => {
 e.preventDefault();
 if (e.touches.length === 1 && dragging) {
  const ratio = getCanvasRatio();
  posX += (e.touches[0].clientX - startX) * ratio;
  posY += (e.touches[0].clientY - startY) * ratio;
  startX = e.touches[0].clientX;
  startY = e.touches[0].clientY;
  render();
 }
 if (e.touches.length === 2) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const dist = Math.hypot(dx, dy);
  scale *= dist / pinchStart;
  if (scale < 0.3) scale = 0.3;
  if (scale > 5) scale = 5;
  pinchStart = dist;
  render();
 }
}, { passive: false });

preview.addEventListener("touchend", () => dragging = false);
</script>
</body>
</html>
