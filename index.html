<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kartu Cita-Cita SD Negeri Serut 01</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;max-width:900px;margin:auto;padding:20px;text-align:center}
.panel{background:#fff;padding:20px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.15)}
input{width:100%;padding:12px;margin:8px 0;box-sizing:border-box}
button{padding:12px 20px;border:none;border-radius:10px;background:#1565c0;color:#fff;cursor:pointer}
#preview{max-width:420px;width:100%;margin-top:15px;border-radius:12px}
canvas{display:none}
</style>
</head>
<body>
<div class="panel">
<h2>Kartu Cita-Cita SD Negeri Serut 01</h2>

<input type="file" id="foto" accept="image/*">
<input type="text" id="nama" placeholder="Nama Siswa">
<input type="text" id="cita" placeholder="Cita-cita">

<p><b>Geser foto dengan mouse/jari. Zoom dengan roda mouse atau cubit layar HP.</b></p>

<button id="renderBtn">Preview</button>
<a id="download" style="display:none"><button type="button">Download PNG</button></a>
<br><br>
<img id="preview">
</div>

<canvas id="canvas" width="1529" height="2048"></canvas>

<script>
const TEMPLATE="template.png";

let userImage=null;
let posX=0;
let posY=0;
let scale=1.0;
let dragging=false,startX=0,startY=0;

const preview=document.getElementById("preview");

function autoFont(ctx,text,maxWidth,start){
 let s=start;
 while(s>20){
  ctx.font=`bold ${s}px Arial`;
  if(ctx.measureText(text).width<=maxWidth) return s;
  s--;
 }
 return 20;
}

function render(){
 if(!userImage) return;

 const canvas=document.getElementById("canvas");
 const ctx=canvas.getContext("2d");

 const template=new Image();
 template.src=TEMPLATE;

 template.onload=()=>{

  ctx.clearRect(0,0,canvas.width,canvas.height);

const ratio = Math.max(
 PHOTO_W / userImage.width,
 PHOTO_H / userImage.height
);

const w = userImage.width * ratio * scale;
const h = userImage.height * ratio * scale;

ctx.drawImage(
 userImage,
 PHOTO_X + (PHOTO_W - w)/2 + posX,
 PHOTO_Y + (PHOTO_H - h)/2 + posY,
 w,
 h
);

  ctx.drawImage(template,0,0,canvas.width,canvas.height);

  const nama=(document.getElementById("nama").value||"").toUpperCase();
  const cita=(document.getElementById("cita").value||"").toUpperCase();

  ctx.fillStyle="#111";
  ctx.textAlign="left";

  let fs=autoFont(ctx,nama,520,52);
  ctx.font=`bold ${fs}px Arial`;
  ctx.fillText(nama,105,1820);

  fs=autoFont(ctx,cita,520,52);
  ctx.font=`bold ${fs}px Arial`;
  ctx.fillText(cita,835,1820);

  const data=canvas.toDataURL("image/png");
  preview.src=data;

  const dl=document.getElementById("download");
  dl.href=data;
  dl.download="Kartu-Cita-Cita.png";
  dl.style.display="inline-block";
 };
}

document.getElementById("foto").addEventListener("change",e=>{
 const f=e.target.files[0];
 if(!f) return;
 const img=new Image();
 img.onload=()=>{
  userImage=img;
  posX=0;
posY=0;
scale=1.0;
  render();
 };
 img.src=URL.createObjectURL(f);
});

document.getElementById("nama").addEventListener("input",render);
document.getElementById("cita").addEventListener("input",render);
document.getElementById("renderBtn").addEventListener("click",render);

preview.addEventListener("mousedown",e=>{
 dragging=true; startX=e.clientX; startY=e.clientY;
});
window.addEventListener("mouseup",()=>dragging=false);
window.addEventListener("mousemove",e=>{
 if(!dragging||!userImage) return;
 posX+=e.clientX-startX;
 posY+=e.clientY-startY;
 startX=e.clientX; startY=e.clientY;
 render();
});

preview.addEventListener("wheel",e=>{
 e.preventDefault();
 scale += e.deltaY<0 ? 0.1 : -0.1;
 if(scale<0.5) scale=0.5;
 if(scale>10) scale=10;
 render();
});

let pinchStart=0;
preview.addEventListener("touchstart",e=>{
 if(e.touches.length===1){
  dragging=true;
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
 }
 if(e.touches.length===2){
  const dx=e.touches[0].clientX-e.touches[1].clientX;
  const dy=e.touches[0].clientY-e.touches[1].clientY;
  pinchStart=Math.hypot(dx,dy);
 }
});

preview.addEventListener("touchmove",e=>{
 e.preventDefault();
 if(e.touches.length===1 && dragging){
  posX+=e.touches[0].clientX-startX;
  posY+=e.touches[0].clientY-startY;
  startX=e.touches[0].clientX;
  startY=e.touches[0].clientY;
  render();
 }
 if(e.touches.length===2){
  const dx=e.touches[0].clientX-e.touches[1].clientX;
  const dy=e.touches[0].clientY-e.touches[1].clientY;
  const dist=Math.hypot(dx,dy);
  scale*=dist/pinchStart;
  if(scale<0.5) scale=0.5;
  if(scale>10) scale=10;
  pinchStart=dist;
  render();
 }
},{passive:false});

preview.addEventListener("touchend",()=>dragging=false);
</script>
</body>
</html>
