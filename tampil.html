<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tampilan Absen - SDN Serut 01</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #1565c0, #2e7d32);
    color: white;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border-radius: 24px;
    padding: 40px;
    text-align: center;
    max-width: 600px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  /* Tombol Mulai */
  .btn-mulai {
    background: #ffc107;
    color: #333;
    padding: 20px 40px;
    border: none;
    border-radius: 50px;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
    transition: transform 0.2s;
  }
  .btn-mulai:hover { transform: scale(1.05); }
  
  .waiting { font-size: 28px; opacity: 0.8; }
  .foto {
    width: 220px; height: 220px;
    border-radius: 50%;
    object-fit: cover;
    border: 6px solid white;
    margin: 0 auto 20px;
    display: block;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }
  .sukses { font-size: 42px; font-weight: bold; color: #a5f3a5; margin-bottom: 10px; }
  .nama { font-size: 48px; font-weight: bold; margin: 10px 0; }
  .kelas { font-size: 24px; opacity: 0.9; margin-bottom: 15px; }
  .waktu { font-size: 20px; opacity: 0.8; }
  .status-bar { position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.4); padding: 8px 16px; border-radius: 20px; font-size: 14px; }
</style>
</head>
<body>

<div class="status-bar" id="status" style="display:none;"><span style="color:#4ade80">●</span> Aktif</div>

<div class="card" id="card">
  <div class="waiting" id="content">
    <h1>Selamat Datang</h1>
    <p>Sistem Absensi SDN Serut 01</p>
    <button class="btn-mulai" onclick="mulaiAplikasi()">MULAI APLIKASI</button>
  </div>
</div>

<audio id="beep" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxlHfUpwFJdrA5miV4pI4L48Zu_XjKJrhg3SFRKx_PbWLDMNwHwqHwLjIADUIUvJwrBXw/exec";
  const FOTO_DEFAULT = "https://cdn-icons-png.flaticon.com/512/847/847969.png";
  let lastTimestamp = 0;
  let pertamaKali = true;

  // Fungsi untuk memulai aplikasi & membuka kunci audio
  function mulaiAplikasi() {
    document.getElementById('content').innerHTML = "📷 Silakan scan barcode di HP";
    document.getElementById('status').style.display = "block";
    
    // Test suara kosong untuk membuka kunci browser
    const unlock = new SpeechSynthesisUtterance("");
    window.speechSynthesis.speak(unlock);
    
    setInterval(cekAbsen, 2000);
    cekAbsen();
  }

  async function cekAbsen() {
    try {
      const res = await fetch(SCRIPT_URL + "?action=last&t=" + Date.now(), { redirect: 'follow' });
      const resp = await res.json();
      if (resp.status !== 'sukses' || !resp.data) return;

      const data = resp.data;
      if (data.timestamp && data.timestamp !== lastTimestamp) {
        const perubahan = lastTimestamp !== 0; 
        lastTimestamp = data.timestamp;
        tampilkan(data, perubahan || !pertamaKali ? true : false);
        pertamaKali = false;
      }
    } catch (err) { console.error("Gagal:", err); }
  }

  function ucapkanNama(namaSiswa) {
    const kalimat = `Terima kasih, ${namaSiswa}. Selamat datang di S D N Serut Satu.`;
    const ucapan = new SpeechSynthesisUtterance(kalimat);
    ucapan.lang = "id-ID";
    ucapan.rate = 0.9;
    window.speechSynthesis.speak(ucapan);
  }

  function tampilkan(data, bunyi) {
    if (bunyi) {
      document.getElementById('beep').play().catch(()=>{});
      ucapkanNama(data.nama);
    }
    const foto = data.foto && data.foto.startsWith('http') ? data.foto : FOTO_DEFAULT;
    const waktu = data.waktu ? new Date(data.waktu).toLocaleString('id-ID') : '';
    document.getElementById('card').innerHTML = `
      <img src="${foto}" class="foto" onerror="this.src='${FOTO_DEFAULT}'">
      <div class="sukses">✅ ABSEN BERHASIL</div>
      <div class="nama">${data.nama || ''}</div>
      <div class="kelas">${data.kelas || ''}</div>
      <div class="waktu">🕒 ${waktu}</div>
    `;
  }
</script>
</body>
</html>
